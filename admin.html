<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Uplift Odisha</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080C14;--bg2:#0E1420;--bg3:#141B2C;--gold:#C9A227;--text:#F0F4FF;--muted:#7A8AAA;--border:#1E2A40;--card:#111827}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
#loginSection{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:90%;max-width:360px}
.login-card h2{font-family:'Syne',sans-serif;font-size:22px;margin-bottom:8px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:12px;background:var(--gold);color:#080C14;border:none;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:14px;cursor:pointer}
.login-btn:hover{background:#E8C04A}
#dashSection{display:none}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.logo span{color:var(--gold)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.logout-btn:hover{color:var(--text);border-color:var(--muted)}
.dash-body{padding:30px 5%}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.stat-box .num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--gold)}
.stat-box .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--gold)}
.filter-sel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;outline:none}
.export-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.export-btn:hover{border-color:var(--muted);color:var(--text)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid rgba(30,42,64,0.5);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-new{background:rgba(201,162,39,0.15);color:var(--gold)}
.badge-contacted{background:rgba(34,197,94,0.15);color:#4ade80}
.badge-enrolled{background:rgba(26,110,255,0.15);color:#60a5fa}
.status-sel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.empty{text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>

<div id="loginSection">
  <div class="login-card">
    <h2>Admin Login</h2>
    <p>Uplift Odisha · Enquiry Dashboard</p>
    <div class="field"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@upliftodisha.in"></div>
    <div class="field"><label>Password</label><input type="password" id="adminPass" placeholder="Your password"></div>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <p id="loginErr" style="color:#f87171;font-size:12px;margin-top:12px;display:none">Invalid email or password.</p>
  </div>
</div>

<div id="dashSection">
  <header>
    <div class="logo">Uplift<span>Odisha</span> <span style="color:var(--muted);font-weight:400;font-size:13px">· Admin</span></div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </header>
  <div class="dash-body">
    <div class="stats-row">
      <div class="stat-box"><div class="num" id="sTotal">0</div><div class="lbl">Total Enquiries</div></div>
      <div class="stat-box"><div class="num" id="sNew">0</div><div class="lbl">New (not contacted)</div></div>
      <div class="stat-box"><div class="num" id="sContacted">0</div><div class="lbl">Contacted</div></div>
      <div class="stat-box"><div class="num" id="sEnrolled">0</div><div class="lbl">Enrolled</div></div>
    </div>
    <div class="toolbar">
      <input class="search-input" id="searchInput" placeholder="Search name, phone, city..." oninput="renderTable()">
      <select class="filter-sel" id="filterPlan" onchange="renderTable()">
        <option value="">All Programs</option>
        <option value="full">Full Program</option>
        <option value="nimcet">NIMCET Only</option>
        <option value="industry">Industry Readiness</option>
        <option value="unsure">Not sure yet</option>
      </select>
      <select class="filter-sel" id="filterStatus" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="enrolled">Enrolled</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Name</th><th>Phone</th><th>Email</th>
          <th>College & City</th><th>Program</th><th>Message</th><th>Date</th><th>Status</th>
        </tr></thead>
        <tbody id="tableBody"><tr><td colspan="9" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ── REPLACE WITH YOUR FIREBASE CONFIG ────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ─────────────────────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let allData = [];

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dashSection").style.display  = "block";
    loadEnquiries();
  }
});

window.doLogin = async () => {
  const email = document.getElementById("adminEmail").value;
  const pass  = document.getElementById("adminPass").value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch {
    document.getElementById("loginErr").style.display = "block";
  }
};

window.doLogout = async () => {
  await signOut(auth);
  document.getElementById("loginSection").style.display = "flex";
  document.getElementById("dashSection").style.display  = "none";
};

async function loadEnquiries() {
  const snap = await getDocs(query(collection(db, "enquiries"), orderBy("submittedAt", "desc")));
  allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  updateStats();
  renderTable();
}

function updateStats() {
  document.getElementById("sTotal").textContent     = allData.length;
  document.getElementById("sNew").textContent       = allData.filter(e => e.status === "new" || !e.status).length;
  document.getElementById("sContacted").textContent = allData.filter(e => e.status === "contacted").length;
  document.getElementById("sEnrolled").textContent  = allData.filter(e => e.status === "enrolled").length;
}

window.renderTable = () => {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const plan   = document.getElementById("filterPlan").value;
  const status = document.getElementById("filterStatus").value;

  const filtered = allData.filter(e =>
    (!search || [e.name, e.phone, e.email, e.college].join(" ").toLowerCase().includes(search)) &&
    (!plan   || e.plan === plan) &&
    (!status || (e.status || "new") === status)
  );

  const tbody = document.getElementById("tableBody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty">No results found</td></tr>`;
    return;
  }

  const planLabels = { full: "Full Program", nimcet: "NIMCET Only", industry: "Industry Readiness", unsure: "Not sure" };

  tbody.innerHTML = filtered.map((e, i) => {
    const st     = e.status || "new";
    const date   = e.submittedAt?.toDate ? e.submittedAt.toDate().toLocaleDateString("en-IN") : "—";
    const badge  = st === "enrolled" ? "badge-enrolled" : st === "contacted" ? "badge-contacted" : "badge-new";
    return `<tr>
      <td style="color:var(--muted)">${i + 1}</td>
      <td style="font-weight:500">${e.name || "—"}</td>
      <td><a href="tel:${e.phone}" style="color:var(--gold);text-decoration:none">${e.phone || "—"}</a></td>
      <td style="color:var(--muted)">${e.email || "—"}</td>
      <td style="color:var(--muted);max-width:160px">${e.college || "—"}</td>
      <td style="color:var(--gold);font-size:12px">${planLabels[e.plan] || e.plan || "—"}</td>
      <td style="color:var(--muted);max-width:180px;font-size:12px">${e.message || "—"}</td>
      <td style="color:var(--muted)">${date}</td>
      <td>
        <select class="status-sel" onchange="updateStatus('${e.id}', this.value)">
          <option value="new"       ${st==="new"       ?"selected":""}>New</option>
          <option value="contacted" ${st==="contacted" ?"selected":""}>Contacted</option>
          <option value="enrolled"  ${st==="enrolled"  ?"selected":""}>Enrolled</option>
        </select>
      </td>
    </tr>`;
  }).join("");
};

window.updateStatus = async (id, newStatus) => {
  await updateDoc(doc(db, "enquiries", id), { status: newStatus });
  const item = allData.find(e => e.id === id);
  if (item) item.status = newStatus;
  updateStats();
};

window.exportCSV = () => {
  const headers = ["Name","Phone","Email","College","Program","Message","Date","Status"];
  const rows    = allData.map(e => [
    e.name, e.phone, e.email, e.college, e.plan, e.message,
    e.submittedAt?.toDate ? e.submittedAt.toDate().toLocaleDateString("en-IN") : "",
    e.status || "new"
  ]);
  const csv  = [headers, ...rows].map(r => r.map(c => `"${(c||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `uplift_enquiries_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
};
</script>
</body>
</html>
